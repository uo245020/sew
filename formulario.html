    <h1>Formulario para dejar opiniones sobre Allan Kay</h1>
    <img src="multimedia/alan3.jpg" alt="Alan Kay" height="200" width="220">
    <form>
      <label for="nom">Nombre:</label> 
        <input id="nom" type="text" />
        <label for="tel">Teléfono:</label> 
        <input id="tel" type="number" />
        <label for="email">Email:</label> 
        <input id="email" type="email" />
      <fieldset>
       <legend> Valoración de sus aportaciones </legend>
       <label for="cero"> <input id="cero" type=radio name=size> 0 </label>
       <label for="uno"> <input id="uno" type=radio name=size> 1 </label>
       <label for="dos"> <input id="dos" type=radio name=size> 2 </label>
       <label for="tres"> <input id="tres" type=radio name=size> 3 </label>
       <label for="cuatro"> <input id="cuatro" type=radio name=size> 4 </label>
       <label for="cinco"> <input id="cinco" type=radio name=size> 5 </label>
       <label for="seis"> <input id="seis" type=radio name=size> 6 </label>
       <label for="siete"> <input id="siete" type=radio name=size> 7 </label>
       <label for="ocho"> <input id="ocho" type=radio name=size> 8 </label>
       <label for="nueve"> <input id="cero" type=radio name=size> 9 </label>
       <label for="diez"> <input id="diez" type=radio name=size> 10 </label>
      </fieldset>

      <label for="com">Comentarios: <textarea id="com"></textarea></label>
      <p><input type="submit" value="Enviar opinión" ></p>
     </form>
